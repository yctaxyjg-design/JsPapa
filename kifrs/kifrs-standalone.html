<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KIFRS 검색 — 한국채택국제회계기준</title>
  <meta name="description" content="한국채택국제회계기준(K-IFRS) 기업회계기준서를 브라우저에서 검색하는 정적 RAG 검색 앱" />
  <style>
:root {
  --bg: #f5f5f7;
  --surface: #ffffff;
  --text: #1d1d1f;
  --muted: #6e6e73;
  --accent: #007aff;
  --accent-hover: #0066d6;
  --danger: #ff3b30;
  --border: #d2d2d7;
  --radius: 14px;
  --shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue",
    "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

.hero {
  text-align: center;
  padding: 56px 20px 32px;
  background: linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
}

.hero h1 {
  margin: 0 0 8px;
  font-size: 34px;
  letter-spacing: -0.02em;
}

.subtitle {
  margin: 0;
  color: var(--muted);
  font-size: 17px;
}

main {
  max-width: 760px;
  margin: 0 auto;
  padding: 0 20px 64px;
}

.notice {
  background: #fff8e6;
  border: 1px solid #f6dc7a;
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 24px;
}

.notice h2 {
  margin: 0 0 8px;
  font-size: 15px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: #8a6d00;
}

.notice p {
  margin: 0;
  font-size: 14px;
  color: #5b4a00;
}

.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
}

.card h2 {
  margin: 0 0 16px;
  font-size: 20px;
  letter-spacing: -0.01em;
}

form .row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
}

form label {
  display: flex;
  flex-direction: column;
  font-size: 13px;
  color: var(--muted);
  gap: 6px;
}

form input[type="text"],
form input[type="time"],
form select {
  font: inherit;
  font-size: 15px;
  color: var(--text);
  padding: 10px 12px;
  background: #fbfbfd;
  border: 1px solid var(--border);
  border-radius: 10px;
  outline: none;
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
}

form input:focus,
form select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15);
}

.days {
  border: none;
  padding: 0;
  margin: 16px 0 20px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.days legend {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 8px;
  width: 100%;
}

.days label {
  flex-direction: row;
  align-items: center;
  gap: 6px;
  font-size: 14px;
  color: var(--text);
  background: #fbfbfd;
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 6px 14px;
  cursor: pointer;
  user-select: none;
}

.days input { accent-color: var(--accent); }

button,
.ghost-button {
  font: inherit;
  font-size: 15px;
  font-weight: 500;
  padding: 10px 18px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  transition: background 0.15s ease, opacity 0.15s ease;
}

form > button[type="submit"] {
  background: var(--accent);
  color: white;
}

form > button[type="submit"]:hover { background: var(--accent-hover); }

.ghost,
.ghost-button {
  background: transparent;
  color: var(--accent);
  border: 1px solid var(--border);
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.ghost:hover,
.ghost-button:hover { background: #f0f0f3; }

.ghost.danger { color: var(--danger); }

.actions {
  display: flex;
  gap: 8px;
  margin-top: 16px;
  flex-wrap: wrap;
}

.schedule-list {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.schedule-list li {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 14px 16px;
  background: #fbfbfd;
  border: 1px solid var(--border);
  border-radius: 12px;
}

.schedule-list .meta {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.schedule-list .meta strong { font-size: 16px; }
.schedule-list .meta span { font-size: 13px; color: var(--muted); }

.schedule-list .delete {
  background: transparent;
  color: var(--danger);
  border: none;
  padding: 4px 8px;
  font-size: 14px;
}

.empty {
  color: var(--muted);
  font-size: 14px;
  padding: 12px 0;
  text-align: center;
}

.guide-step {
  background: #fbfbfd;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 12px;
}

.guide-step h3 {
  margin: 0 0 10px;
  font-size: 16px;
}

.guide-step ol {
  margin: 0;
  padding-left: 20px;
  font-size: 14px;
  color: var(--text);
}

.guide-step ol li { margin-bottom: 6px; }

.guide-step code {
  background: #eef0f3;
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 13px;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
}

footer {
  text-align: center;
  padding: 24px;
  font-size: 12px;
  color: var(--muted);
}

@media (max-width: 600px) {
  form .row { grid-template-columns: 1fr; }
  .hero h1 { font-size: 28px; }
}

/* KIFRS 검색 전용 스타일 — 공통 styles.css 의 변수를 재사용한다 */

.search-card { padding: 20px; }

.search-box input {
  width: 100%;
  font: inherit;
  font-size: 18px;
  padding: 14px 16px;
  background: #fbfbfd;
  border: 1px solid var(--border);
  border-radius: 12px;
  outline: none;
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
}

.search-box input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15);
}

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 14px;
}

.chip {
  background: #fbfbfd;
  color: var(--accent);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 6px 14px;
  font-size: 14px;
}

.chip:hover { background: #f0f0f3; }

.status {
  margin: 14px 2px 0;
  font-size: 13px;
  color: var(--muted);
}

.results {
  list-style: none;
  margin: 20px 0 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.result {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  box-shadow: var(--shadow);
}

.result-head {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  font-size: 12px;
  margin-bottom: 8px;
}

.badge {
  background: var(--accent);
  color: #fff;
  border-radius: 6px;
  padding: 2px 8px;
  font-weight: 600;
}

.ifrs {
  background: #eef0f3;
  color: var(--muted);
  border-radius: 6px;
  padding: 2px 8px;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
}

.cat { color: var(--muted); }

.score {
  margin-left: auto;
  color: var(--muted);
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 11px;
}

.result h3 {
  margin: 0 0 6px;
  font-size: 18px;
  letter-spacing: -0.01em;
}

.result p {
  margin: 0 0 10px;
  font-size: 14px;
  color: var(--text);
}

.kws { display: flex; flex-wrap: wrap; gap: 6px; }

.kw {
  font-size: 12px;
  color: var(--muted);
  background: #fbfbfd;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 2px 8px;
}

mark {
  background: #fff1a8;
  color: inherit;
  border-radius: 3px;
  padding: 0 1px;
}

.corpus-meta {
  margin-top: 24px;
  font-size: 12px;
  color: var(--muted);
  text-align: center;
}

@media (max-width: 600px) {
  .score { margin-left: 0; width: 100%; }
}

  </style>
</head>

      "이연법인세부채 인식: 원칙적으로 모든 가산할 일시적차이에 대해 인식한다. 다만 영업권의 최초인식, 그리고 사업결합이 아니면서 거래 당시 회계이익과 과세소득에 영향을 주지 않는 자산·부채의 최초인식에서 생기는 차이는 제외한다.",
      "이연법인세자산 인식: 차감할 일시적차이·미사용 세무상결손금·미사용 세액공제는, 이를 활용할 수 있는 미래 과세소득의 발생 가능성이 높은(probable) 범위에서 이연법인세자산으로 인식한다. 매 보고기간말 회수가능성을 재검토한다.",
      "최초인식 예외: 사업결합이 아니고 거래 시점에 회계이익과 과세소득(세무상결손금) 어느 쪽에도 영향을 미치지 않는 거래에서 자산·부채를 최초인식할 때 생기는 일시적차이에는 이연법인세를 인식하지 않는다.",
      "측정: 이연법인세 자산·부채는 보고기간말까지 제정되었거나 실질적으로 제정된 세율로, 자산의 회수·부채의 결제가 예상되는 방식을 반영해 측정한다. 이연법인세 자산·부채는 할인하지 않는다.",
      "대응 인식: 법인세효과는 관련 거래·사건이 인식된 곳을 따라간다. 당기손익에 인식된 항목은 당기손익으로, 기타포괄손익이나 자본에 직접 인식된 항목(예: 재평가잉여금, 확정급여 재측정요소)은 같은 곳에 법인세효과를 인식한다.",
      "표시·상계: 당기법인세 자산·부채는 법적 상계권리와 순액결제 의도가 있을 때 상계한다. 이연법인세 자산·부채는 동일 과세당국 요건 충족 시 상계하며, 재무상태표에서 비유동으로 분류한다.",
      "투자 관련 일시적차이: 종속기업·지점·관계기업·공동약정 투자와 관련된 일시적차이는, 소멸시기를 통제할 수 있고 예측가능한 미래에 소멸하지 않을 것으로 예상되면 이연법인세부채를 인식하지 않는 등 별도 요건을 둔다."
    ] },
    { "no": "1016", "ifrs": "IAS 16", "title": "유형자산", "category": "자산", "summary": "유형자산의 인식, 취득원가 측정, 후속측정(원가모형·재평가모형), 감가상각, 제거를 규정한다. 감가상각방법, 내용연수, 잔존가치, 재평가잉여금을 다룬다.", "keywords": ["유형자산", "감가상각", "원가모형", "재평가모형", "내용연수", "잔존가치", "재평가잉여금", "취득원가"] },
    { "no": "1019", "ifrs": "IAS 19", "title": "종업원급여", "category": "부채·비용", "summary": "단기종업원급여, 퇴직급여(확정기여제도·확정급여제도), 기타장기종업원급여, 해고급여의 회계처리를 규정한다. 예측단위적립방식에 따른 확정급여채무 측정, 순확정급여부채(자산), 근무원가·순이자·재측정요소(보험수리적손익) 구분, 자산인식상한, 과거근무원가, 정산을 다룬다.", "keywords": ["종업원급여", "퇴직급여", "확정급여제도", "확정기여제도", "보험수리적손익", "순확정급여부채", "예측단위적립방식", "근무원가", "과거근무원가", "순이자", "재측정요소", "기타포괄손익", "자산인식상한", "해고급여", "단기종업원급여"], "chunks": [
      "범위와 분류: 종업원급여를 ① 단기종업원급여, ② 퇴직급여, ③ 기타장기종업원급여, ④ 해고급여로 구분해 각각의 인식·측정을 규정한다.",
      "단기종업원급여: 종업원이 근무용역을 제공한 연차보고기간 말 이후 12개월 이내에 전부 결제될 것으로 예상되는 급여(임금·사회보장분담금·유급휴가·이익분배·상여 등). 할인하지 않은 금액으로 비용과 부채로 인식한다. 유급휴가는 누적·비누적으로 구분한다.",
      "퇴직급여제도의 구분: 확정기여제도(DC)는 기업이 고정 기여금만 납부하고 추가의무가 없으며, 확정급여제도(DB)는 약정한 급여를 지급할 의무를 기업이 부담한다. 위험 부담 주체에 따라 분류가 갈린다.",
      "확정기여제도: 해당 기간에 납부할 기여금을 비용(또는 자산)으로 인식한다. 보험수리적위험·투자위험을 종업원이 부담하므로 추가 측정이 단순하다.",
      "확정급여채무 측정: 예측단위적립방식(projected unit credit method)으로 종업원이 당기와 과거에 제공한 근무용역에 귀속되는 급여를 추정하고, 인구통계적·재무적 보험수리적 가정을 사용해 현재가치로 할인한다. 할인율은 우량회사채(또는 국공채) 시장수익률을 사용한다.",
      "순확정급여부채(자산): 확정급여채무의 현재가치에서 사외적립자산의 공정가치를 차감해 산정하며, 초과적립이면 자산인식상한을 적용한다.",
      "당기손익 인식 구성요소: 근무원가(당기근무원가, 과거근무원가, 정산손익)와 순확정급여부채(자산)에 대한 순이자를 당기손익으로 인식한다. 순이자는 기초 순확정급여부채에 할인율을 적용해 계산한다.",
      "재측정요소(기타포괄손익): 보험수리적손익, 사외적립자산의 수익 중 순이자에 포함된 금액을 제외한 부분, 자산인식상한 효과의 변동은 기타포괄손익(OCI)으로 인식하며, 후속기간에 당기손익으로 재분류하지 않는다(이익잉여금 내 대체는 가능).",
      "과거근무원가와 정산: 제도의 개정이나 축소로 생기는 과거근무원가는 발생 시점에 즉시 당기손익으로 인식한다. 정산이 일어나면 정산손익을 당기손익으로 인식한다.",
      "자산인식상한(asset ceiling): 초과적립으로 생긴 확정급여자산은 제도에서 환급받거나 미래 기여금을 절감하여 얻을 수 있는 경제적효익의 현재가치를 한도로 인식한다.",
      "기타장기종업원급여: 장기근속휴가·안식년 등 12개월 이후 결제되는 급여로, 측정은 확정급여와 유사하나 재측정요소를 기타포괄손익이 아닌 당기손익으로 인식한다.",
      "해고급여: 기업이 해고 제안을 더 이상 철회할 수 없게 된 때와 관련 구조조정원가를 인식하는 때 중 이른 날에 비용과 부채로 인식한다."
    ] },
    { "no": "1020", "ifrs": "IAS 20", "title": "정부보조금의 회계처리와 정부지원의 공시", "category": "자산", "summary": "정부보조금의 인식과 표시, 정부지원의 공시를 규정한다. 수익관련보조금과 자산관련보조금의 처리, 이연수익법과 자산차감법을 다룬다.", "keywords": ["정부보조금", "정부지원", "수익관련보조금", "자산관련보조금", "이연수익", "자산차감법"] },
    { "no": "1021", "ifrs": "IAS 21", "title": "환율변동효과", "category": "기타", "summary": "외화거래와 해외사업장의 재무제표 환산을 규정한다. 기능통화와 표시통화, 화폐성·비화폐성항목의 환산, 외환차이의 인식, 해외사업장순투자를 다룬다.", "keywords": ["환율변동", "기능통화", "표시통화", "외화환산", "외환차이", "해외사업장", "화폐성항목"] },
    { "no": "1023", "ifrs": "IAS 23", "title": "차입원가", "category": "부채·비용", "summary": "적격자산의 취득·건설·생산과 직접 관련된 차입원가의 자본화를 규정한다. 자본화 대상·기간, 자본화이자율, 자본화 중단을 다룬다.", "keywords": ["차입원가", "자본화", "적격자산", "자본화이자율", "이자비용"] },
    { "no": "1024", "ifrs": "IAS 24", "title": "특수관계자 공시", "category": "재무제표 표시·공시", "summary": "특수관계자와의 거래, 약정, 채권·채무 잔액에 관한 공시를 규정한다. 특수관계자의 범위, 주요 경영진에 대한 보상 공시를 다룬다.", "keywords": ["특수관계자", "특수관계자거래", "주요 경영진 보상", "지배기업", "공시"] },
    { "no": "1027", "ifrs": "IAS 27", "title": "별도재무제표", "category": "연결·관계기업", "summary": "지배기업·공동기업 참여자·관계기업 투자자가 별도재무제표를 작성할 때 종속기업·공동기업·관계기업 투자의 회계처리와 공시를 규정한다.", "keywords": ["별도재무제표", "종속기업 투자", "원가법", "지분법", "공정가치"] },
    { "no": "1028", "ifrs": "IAS 28", "title": "관계기업과 공동기업에 대한 투자", "category": "연결·관계기업", "summary": "관계기업과 공동기업에 대한 투자의 회계처리로 지분법 적용을 규정한다. 유의적 영향력, 지분법 적용·중단, 손상을 다룬다.", "keywords": ["관계기업", "공동기업", "지분법", "유의적 영향력", "투자손상"] },
    { "no": "1029", "ifrs": "IAS 29", "title": "초인플레이션 경제에서의 재무보고", "category": "기타", "summary": "초인플레이션 경제의 기능통화로 작성하는 재무제표를 보고기간말 현재 측정단위로 재작성하는 방법을 규정한다.", "keywords": ["초인플레이션", "측정단위", "재작성", "일반물가지수"] },
    { "no": "1032", "ifrs": "IAS 32", "title": "금융상품: 표시", "category": "금융상품", "summary": "금융상품의 금융부채·지분상품 분류, 관련 이자·배당·손익의 표시, 금융자산과 금융부채의 상계를 규정한다.", "keywords": ["금융상품", "금융부채", "지분상품", "상계", "복합금융상품", "자기주식"] },
    { "no": "1033", "ifrs": "IAS 33", "title": "주당이익", "category": "재무제표 표시·공시", "summary": "주당이익의 산정과 표시를 규정한다. 기본주당이익과 희석주당이익, 가중평균유통보통주식수, 잠재적보통주를 다룬다.", "keywords": ["주당이익", "기본주당이익", "희석주당이익", "가중평균유통보통주식수", "잠재적보통주"] },
    { "no": "1034", "ifrs": "IAS 34", "title": "중간재무보고", "category": "재무제표 표시·공시", "summary": "중간재무보고서의 최소 내용과 인식·측정 원칙을 규정한다. 중간기간 회계처리, 계절성, 비교표시 대상기간을 다룬다.", "keywords": ["중간재무보고", "중간재무제표", "계절성", "비교표시"] },
    { "no": "1036", "ifrs": "IAS 36", "title": "자산손상", "category": "자산", "summary": "자산의 장부금액이 회수가능액을 초과하지 않도록 손상차손을 인식하는 방법을 규정한다. 손상징후 검토와 영업권·비한정 무형자산의 매년 손상검사, 회수가능액(순공정가치와 사용가치 중 큰 금액), 사용가치(세전 할인율), 현금창출단위(CGU) 배분, 영업권 손상검사 순서, 손상차손환입(영업권 제외)을 다룬다.", "keywords": ["자산손상", "손상차손", "회수가능액", "순공정가치", "사용가치", "세전 할인율", "현금창출단위", "CGU", "영업권 손상", "손상검사", "손상차손환입"], "chunks": [
      "목적과 범위: 자산의 장부금액이 회수가능액을 초과해 계상되지 않도록 손상차손을 인식·환입하는 절차를 규정한다. 재고자산(제1002호), 금융자산(제1109호), 이연법인세자산, 매각예정자산 등 다른 기준서가 다루는 자산은 제외한다.",
      "손상징후 검토: 매 보고기간말에 자산이 손상되었을 수 있는 외부정보(시장가치 급락, 시장이자율 상승 등)와 내부정보(진부화·물리적 손상, 영업성과 악화 등) 징후가 있는지 검토한다.",
      "매년 손상검사 대상: 내용연수가 비한정인 무형자산, 아직 사용할 수 없는 무형자산, 사업결합으로 취득한 영업권은 손상징후와 관계없이 매년 손상검사를 수행한다.",
      "회수가능액: 자산의 순공정가치(공정가치에서 처분부대원가를 뺀 금액)와 사용가치 중 큰 금액으로 측정한다. 둘 중 하나가 장부금액을 초과하면 손상되지 않은 것이다.",
      "사용가치: 자산에서 기대되는 미래현금흐름의 추정치를 화폐의 시간가치와 자산 특유 위험을 반영한 세전 할인율로 할인한 현재가치다. 현금흐름 추정은 합리적·객관적 가정에 근거한다.",
      "손상차손 인식: 장부금액이 회수가능액을 초과하면 그 차액을 손상차손으로 인식한다. 원가모형 자산은 당기손익, 재평가모형 자산은 재평가감소로 처리(기타포괄손익 내 재평가잉여금 우선 차감)한다. 손상 후 감가상각은 새 장부금액 기준으로 조정한다.",
      "현금창출단위(CGU): 개별 자산의 회수가능액을 추정할 수 없으면, 그 자산이 속하면서 다른 자산·자산집단과 거의 독립적인 현금유입을 창출하는 최소 식별가능 자산집단(CGU) 단위로 회수가능액을 추정한다.",
      "영업권 배분과 손상검사: 영업권은 결합의 시너지가 기대되는 CGU(또는 그 집단)에 배분하고 매년 손상검사한다. CGU의 손상차손은 먼저 배분된 영업권을 감액하고, 그 다음 나머지 자산에 장부금액 비례로 배분하되 각 자산의 회수가능액 미만으로는 감액하지 않는다.",
      "손상차손환입: 과거 인식한 손상차손이 더 이상 존재하지 않거나 감소했으면, 회수가능액 증가분만큼 환입한다. 단 손상차손을 인식하지 않았을 경우의 장부금액(상각 후)을 한도로 한다. 영업권에 대해 인식한 손상차손은 환입하지 않는다.",
      "공시: 손상차손·환입 금액과 인식·환입한 항목, 회수가능액 측정 기준(순공정가치 또는 사용가치), 할인율, CGU에 배분된 영업권과 주요 가정 등을 공시한다."
    ] },

    { "no": "1107", "ifrs": "IFRS 7", "title": "금융상품: 공시", "category": "금융상품", "summary": "금융상품이 재무상태와 성과에 미치는 영향, 노출되는 위험과 위험관리에 관한 공시를 규정한다. 신용위험·유동성위험·시장위험을 다룬다.", "keywords": ["금융상품 공시", "신용위험", "유동성위험", "시장위험", "위험관리", "공정가치 서열체계"] },

    { "no": "1109", "ifrs": "IFRS 9", "title": "금융상품", "category": "금융상품", "summary": "금융자산·금융부채의 분류와 측정, 기대신용손실에 따른 손상, 위험회피회계를 규정한다. 사업모형과 계약상 현금흐름 특성(원리금만으로 구성, SPPI)에 따라 상각후원가·FVOCI·FVPL로 분류하고, 신용위험 변동에 따른 12개월·전체기간 기대신용손실(3단계)을 인식한다. 지분상품 FVOCI 선택, 금융부채 자기신용위험, 제거, 위험회피회계를 다룬다.", "keywords": ["금융상품", "금융자산 분류", "사업모형", "원리금 지급", "SPPI", "상각후원가", "FVOCI", "FVPL", "공정가치옵션", "기대신용손실", "신용위험 유의적 증가", "12개월·전체기간", "자기신용위험", "위험회피회계", "현금흐름위험회피"], "chunks": [
      "구성: 제1109호는 ① 금융자산·금융부채의 분류와 측정, ② 기대신용손실에 따른 손상, ③ 위험회피회계의 세 영역을 규정한다.",
      "금융자산 분류 기준: 금융자산은 ① 금융자산을 관리하는 사업모형과 ② 계약상 현금흐름의 특성(특정일에 원금과 원금잔액 이자만으로 구성되는지, SPPI 검정)에 따라 상각후원가(AC), 기타포괄손익-공정가치(FVOCI), 당기손익-공정가치(FVPL)로 분류한다.",
      "상각후원가(AC) 측정: 계약상 현금흐름 수취 목적의 사업모형이고 SPPI를 충족하는 채무상품은 상각후원가로 측정하며, 유효이자율법으로 이자수익을 인식한다.",
      "기타포괄손익-공정가치(FVOCI, 채무상품): 계약상 현금흐름 수취와 매도가 모두 목적인 사업모형이고 SPPI를 충족하면 FVOCI로 분류한다. 평가손익은 기타포괄손익으로 인식하되 처분 시 당기손익으로 재분류하고, 이자수익·손상차손·외환손익은 당기손익으로 인식한다.",
      "지분상품 FVOCI 선택: 단기매매목적이 아닌 지분상품은 최초인식 시 평가손익을 기타포괄손익으로 표시하도록 취소 불가능하게 선택할 수 있다. 이 경우 평가손익은 처분해도 당기손익으로 재분류하지 않으며(자본 내 대체 가능), 배당금은 당기손익으로 인식한다.",
      "당기손익-공정가치(FVPL): AC·FVOCI 요건을 충족하지 못하는 금융자산은 FVPL로 측정해 평가손익을 당기손익으로 인식한다. 회계불일치를 제거·유의적으로 줄이는 경우 최초인식 시 FVPL로 지정하는 공정가치옵션을 적용할 수 있다.",
      "금융부채 분류·측정: 금융부채는 원칙적으로 상각후원가로 측정한다. FVPL로 지정한 금융부채는 자기신용위험 변동에 따른 공정가치 변동분을 기타포괄손익으로, 나머지는 당기손익으로 인식한다.",
      "손상 — 기대신용손실(ECL): 발생손실이 아닌 기대신용손실 모형을 적용한다. 최초인식 후 신용위험이 유의적으로 증가하지 않았으면 12개월 기대신용손실을, 유의적으로 증가했으면 전체기간 기대신용손실을 손실충당금으로 인식한다(일반적 3단계 접근법).",
      "손상 간편법: 유의적 금융요소가 없는 매출채권·계약자산 등에는 항상 전체기간 기대신용손실을 인식하는 간편법을 적용한다.",
      "제거: 금융자산은 현금흐름에 대한 계약상 권리가 소멸하거나, 양도하면서 위험과 보상의 대부분을 이전(또는 통제 이전)한 때 제거한다.",
      "위험회피회계: 위험회피대상항목과 위험회피수단을 지정하고 문서화하며, 공정가치위험회피·현금흐름위험회피·해외사업장순투자 위험회피로 구분한다. 경제적 관계 등 위험회피효과 요건을 충족하면 손익 인식시점의 불일치를 줄이도록 회계처리한다."
    ] },

    return tokens;
  }

  // --- 색인 -----------------------------------------------------------------
  const K1 = 1.5; // BM25 term frequency 포화 계수
  const B = 0.75; // BM25 길이 정규화 계수

  let docs = [];      // { ref, fields..., tokens, len, tf }
  let df = new Map();  // token -> document frequency
  let avgLen = 0;
  let ready = false;

  function buildDocText(s) {
    // 검색 대상 필드를 하나로 합친다. 제목/요약/키워드/번호 가중치를 위해
    // 제목·키워드는 반복 삽입해 비중을 높인다.
    return [
      s.no, s.no, s.ifrs,
      s.title, s.title, s.title,
      s.category,
      (s.keywords || []).join(" "), (s.keywords || []).join(" "),
      s.summary
    ].join(" ");
  }

  function index(standards) {
    docs = [];
    df = new Map();
    let totalLen = 0;

    for (const s of standards) {
      const tokens = tokenize(buildDocText(s));
      const tf = new Map();
      for (const t of tokens) tf.set(t, (tf.get(t) || 0) + 1);
      for (const t of tf.keys()) df.set(t, (df.get(t) || 0) + 1);
      totalLen += tokens.length;
      docs.push({ ref: s, len: tokens.length, tf });
    }
    avgLen = docs.length ? totalLen / docs.length : 0;
    ready = true;
  }

  // --- 검색 -----------------------------------------------------------------
  function idf(token) {
    const n = docs.length;
    const dfi = df.get(token) || 0;
    // BM25+ 형태로 음수 방지
    return Math.log(1 + (n - dfi + 0.5) / (dfi + 0.5));
  }

  function search(query, limit = 10) {
    if (!ready) return [];
    const qTokens = tokenize(query);
    if (qTokens.length === 0) return [];
    const uniqueQ = [...new Set(qTokens)];

    const scored = [];
    for (const doc of docs) {
      let score = 0;
      let matched = 0;
      for (const t of uniqueQ) {
        const f = doc.tf.get(t) || 0;
        if (f === 0) continue;
        matched++;
        const denom = f + K1 * (1 - B + B * (doc.len / (avgLen || 1)));
        score += idf(t) * ((f * (K1 + 1)) / denom);
      }
      if (score > 0) scored.push({ doc, score, matched });
    }

    // 일치 토큰 수가 많을수록 우선, 그다음 BM25 점수
    scored.sort((a, b) => b.matched - a.matched || b.score - a.score);
    return scored.slice(0, limit).map((x) => ({
      standard: x.doc.ref,
      score: x.score,
      matched: x.matched
    }));
  }

  // 질의 토큰과 겹치는 부분을 <mark> 로 감싼다 (요약/제목 표시용).
  function highlight(text, query) {
    if (!text) return "";
    const qSet = new Set(tokenize(query).filter((t) => t.length >= 1));
    // 한글 바이그램/단어가 들어간 연속 구간을 강조하기 위해 어절 단위로 검사
    const escape = (s) =>
      s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    const parts = String(text).split(/(\s+)/);
    return parts
      .map((part) => {
        if (/^\s+$/.test(part)) return part;
        const lower = part.toLowerCase();
        const hit =
          qSet.has(lower) ||
          [...qSet].some((q) => q.length >= 2 && lower.includes(q));
        const safe = escape(part);
        return hit ? `<mark>${safe}</mark>` : safe;
      })
      .join("");
  }

  async function load(url = "corpus.json") {
    // standalone(단일 파일) 모드: 데이터가 페이지에 내장돼 있으면 fetch 없이 사용.
    // → file:// 로 더블클릭해도 동작하고, 인터넷/서버가 필요 없다.
    if (typeof window !== "undefined" && window.__KIFRS_CORPUS__) {
      const data = window.__KIFRS_CORPUS__;
      index(data.standards || []);
      return data;
    }
    const res = await fetch(url, { cache: "no-cache" });
    if (!res.ok) throw new Error(`corpus 로드 실패: HTTP ${res.status}`);
    const data = await res.json();
    index(data.standards || []);
    return data;
  }

  return { load, index, search, highlight, tokenize, get count() { return docs.length; } };
})();

// --- UI 연결 ----------------------------------------------------------------
(() => {
  const $ = (sel) => document.querySelector(sel);
  const input = $("#q");
  const results = $("#results");
  const status = $("#status");
  const meta = $("#corpus-meta");
  let meta_data = null;

  function render(query) {
    const q = query.trim();
    if (!q) {
      results.innerHTML = "";
      status.textContent = `${KIFRS.count}개 기준서가 색인되어 있습니다. 검색어를 입력하세요.`;
      return;
    }
    const hits = KIFRS.search(q, 12);
    if (hits.length === 0) {
      results.innerHTML = "";
      status.textContent = `"${q}" 와 일치하는 기준서를 찾지 못했습니다.`;
      return;
    }
    status.textContent = `"${q}" — ${hits.length}건`;
    results.innerHTML = hits
      .map(({ standard: s, score, matched }) => {
        const title = KIFRS.highlight(s.title, q);
        const summary = KIFRS.highlight(s.summary, q);
        const kws = (s.keywords || [])
          .map((k) => `<span class="kw">${KIFRS.highlight(k, q)}</span>`)
          .join("");
        return `
          <li class="result">
            <div class="result-head">
              <span class="badge">제${s.no}호</span>
              <span class="ifrs">${s.ifrs}</span>
              <span class="cat">${s.category}</span>
              <span class="score" title="BM25 점수 / 일치 토큰">${score.toFixed(2)} · ${matched}match</span>
            </div>
            <h3>${title}</h3>
            <p>${summary}</p>
            <div class="kws">${kws}</div>
          </li>`;
      })
      .join("");
  }

  KIFRS.load()
    .then((data) => {
      meta_data = data;
      if (meta) {
        meta.textContent = `데이터: ${data.source} · 버전 ${data.version} · ${KIFRS.count}개 기준서`;
      }
      render(input.value);
      input.focus();
    })
    .catch((err) => {
      status.textContent = `색인을 불러오지 못했습니다. ${err.message} (file:// 로 직접 열면 fetch가 막힐 수 있습니다. 정적 서버로 띄우세요.)`;
    });

  let t;
  input.addEventListener("input", () => {
    clearTimeout(t);
    t = setTimeout(() => render(input.value), 80);
  });

  // 예시 칩 클릭
  document.addEventListener("click", (e) => {
    const chip = e.target.closest("[data-q]");
    if (!chip) return;
    input.value = chip.getAttribute("data-q");
    render(input.value);
    input.focus();
  });
})();

  </script>
</body>
</html>
